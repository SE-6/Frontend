<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake Checkout</title>
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div id="app" class="w-full max-w-md p-6 bg-white rounded-xl shadow-lg space-y-4">
      <h1 class="text-2xl font-semibold text-center">Fake Checkout</h1>
      <div class="space-y-4">
        <label class="block">
          <span class="text-gray-700">Price (€)</span>
          <input
            id="price"
            type="number"
            value="100"
            min="0.01"
            step="0.01"
            class="mt-1 block w-full rounded-md border-gray-300 focus:border-indigo-500 focus:ring-indigo-500"
          />
        </label>
        <label class="block">
          <span class="text-gray-700">Country</span>
          <select
            id="country"
            class="mt-1 block w-full rounded-md border-gray-300 focus:border-indigo-500 focus:ring-indigo-500"
          >
            <option value="UK">United Kingdom</option>
            <option value="DE" selected>Germany</option>
            <option value="FR">France</option>
          </select>
        </label>
        <button
          id="calculate"
          class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition"
        >
          Calculate Total
        </button>
      </div>
      <p id="total" class="text-xl font-medium text-center"></p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
